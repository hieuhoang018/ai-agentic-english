name: ai-agentic-english

x-postgres-image: &postgres-image postgres:16-alpine

services:
  # ---------------------------------------------------------------------
  # Per-service Postgres instances (one database per backend service)
  # ---------------------------------------------------------------------
  postgres-user:
    image: *postgres-image
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_service
    ports:
      - '5433:5432'
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-learning-materials:
    image: *postgres-image
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: learning_materials_service
    ports:
      - '5434:5432'
    volumes:
      - postgres-learning-materials-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-memory-progress:
    image: *postgres-image
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: memory_progress_service
    ports:
      - '5435:5432'
    volumes:
      - postgres-memory-progress-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-ai-tutor:
    image: *postgres-image
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_tutor_service
    ports:
      - '5436:5432'
    volumes:
      - postgres-ai-tutor-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-notification:
    image: *postgres-image
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification_service
    ports:
      - '5437:5432'
    volumes:
      - postgres-notification-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------
  # Shared infrastructure
  # ---------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0
    restart: unless-stopped
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: ai-agentic-english-kafka

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/audio &&
      mc mb -p local/attachments &&
      exit 0
      "

  kong:
    image: kong:3.8
    restart: unless-stopped
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ../gateway/kong/kong.yml:/kong/declarative/kong.yml:ro
    ports:
      - '8000:8000'
      - '8001:8001'
    depends_on:
      - user-service
      - learning-materials-service
      - memory-progress-service
      - ai-tutor-service
      - notification-service

  # ---------------------------------------------------------------------
  # Backend services
  # ---------------------------------------------------------------------
  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    restart: unless-stopped
    ports:
      - '4001:4001'
    environment:
      PORT: 4001
      DATABASE_URL: postgresql://postgres:postgres@postgres-user:5432/user_service
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-whsec_aqtY1brapqEHcp2fCAUoFGNYxncE1jeNpoWZUOKTfNY=}
      CLERK_ISSUER: ${CLERK_ISSUER:-https://test-clerk.example.com}
    depends_on:
      postgres-user:
        condition: service_healthy

  learning-materials-service:
    build:
      context: ..
      dockerfile: services/learning-materials-service/Dockerfile
    restart: unless-stopped
    ports:
      - '4002:4002'
    environment:
      PORT: 4002
      DATABASE_URL: postgresql://postgres:postgres@postgres-learning-materials:5432/learning_materials_service
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres-learning-materials:
        condition: service_healthy

  memory-progress-service:
    build:
      context: ..
      dockerfile: services/memory-progress-service/Dockerfile
    restart: unless-stopped
    ports:
      - '4003:4003'
    environment:
      PORT: 4003
      DATABASE_URL: postgresql://postgres:postgres@postgres-memory-progress:5432/memory_progress_service
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres-memory-progress:
        condition: service_healthy

  ai-tutor-service:
    build:
      context: ..
      dockerfile: services/ai-tutor-service/Dockerfile
    restart: unless-stopped
    ports:
      - '4004:4004'
    environment:
      PORT: 4004
      DATABASE_URL: postgresql://postgres:postgres@postgres-ai-tutor:5432/ai_tutor_service
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      INFERENCE_MODE: mock
    depends_on:
      postgres-ai-tutor:
        condition: service_healthy

  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    restart: unless-stopped
    ports:
      - '4005:4005'
    environment:
      PORT: 4005
      DATABASE_URL: postgresql://postgres:postgres@postgres-notification:5432/notification_service
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres-notification:
        condition: service_healthy

volumes:
  postgres-user-data:
  postgres-learning-materials-data:
  postgres-memory-progress-data:
  postgres-ai-tutor-data:
  postgres-notification-data:
  minio-data:
