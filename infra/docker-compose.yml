name: ai-agentic-english

x-postgres-image: &postgres-image postgres:16-alpine

services:
  # ---------------------------------------------------------------------
  # Per-service Postgres instances (one database per backend service)
  # ---------------------------------------------------------------------
  postgres-user:
    image: *postgres-image
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_service
    ports:
      - '5433:5432'
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-learning-materials:
    image: *postgres-image
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: learning_materials_service
    ports:
      - '5434:5432'
    volumes:
      - postgres-learning-materials-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-notification:
    image: *postgres-image
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification_service
    ports:
      - '5437:5432'
    volumes:
      - postgres-notification-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------
  # Shared infrastructure
  # ---------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0
    restart: unless-stopped
    ports:
      - '9092:9092'
      - '9094:9094'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # PLAINTEXT is for container-to-container traffic (KAFKA_BROKERS=kafka:9092 in each
      # service's compose env); HOST is for `npm run dev` on the host machine reaching this
      # same broker via the published port (KAFKA_BROKERS=localhost:9094 in .env.example).
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,HOST://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: ai-agentic-english-kafka
    healthcheck:
      test: ['CMD-SHELL', '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1']
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/audio &&
      mc mb -p local/attachments &&
      exit 0
      "

  kong:
    image: kong:3.8
    restart: unless-stopped
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ../gateway/kong/kong.yml:/kong/declarative/kong.yml:ro
    ports:
      - '8000:8000'
      - '8001:8001'
    depends_on:
      - user-service
      - learning-materials-service
      - notification-service
      - agt-orchestrator

  # ---------------------------------------------------------------------
  # Backend services
  # ---------------------------------------------------------------------
  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    restart: unless-stopped
    ports:
      - '4001:4001'
    environment:
      PORT: 4001
      DATABASE_URL: postgresql://postgres:postgres@postgres-user:5432/user_service
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-whsec_aqtY1brapqEHcp2fCAUoFGNYxncE1jeNpoWZUOKTfNY=}
      CLERK_ISSUER: ${CLERK_ISSUER:-https://test-clerk.example.com}
      INTERNAL_SECRET: dev-internal-secret
    depends_on:
      postgres-user:
        condition: service_healthy

  learning-materials-service:
    build:
      context: ..
      dockerfile: services/learning-materials-service/Dockerfile
    restart: unless-stopped
    ports:
      - '4002:4002'
    environment:
      PORT: 4002
      DATABASE_URL: postgresql://postgres:postgres@postgres-learning-materials:5432/learning_materials_service
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      INTERNAL_SECRET: dev-internal-secret
    depends_on:
      postgres-learning-materials:
        condition: service_healthy

  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    restart: unless-stopped
    ports:
      - '4005:4005'
    environment:
      PORT: 4005
      DATABASE_URL: postgresql://postgres:postgres@postgres-notification:5432/notification_service
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      USER_SERVICE_URL: http://user-service:4001
      REVIEW_AGENT_URL: http://agt07-review:8107
      INTERNAL_SECRET: dev-internal-secret
    depends_on:
      postgres-notification:
        condition: service_healthy

  # ── Agent infrastructure ────────────────────────────────────────────────────
  postgres-agents:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - '5438:5432'
    environment:
      POSTGRES_DB: agent_ltm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-agents-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d agent_ltm']
      interval: 5s
      timeout: 5s
      retries: 10

  languagetool:
    image: silviof/docker-languagetool:latest
    restart: unless-stopped
    ports:
      - '8082:8010'
    environment:
      Java_Xms: 256m
      Java_Xmx: 1g

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama-models:/root/.ollama
    environment:
      OLLAMA_MAX_LOADED_MODELS: '1'

  minio-init-agents:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/pronunciation-audio &&
      mc mb -p local/exercise-audio &&
      mc mb -p local/writing-samples &&
      mc mb -p local/passage-audio &&
      mc mb -p local/assessment-audio &&
      exit 0
      "

  # ── Agent services (ports 8101-8111) ────────────────────────────────────────
  agt01-profiling:
    build:
      context: ../agents
      dockerfile: agt01_profiling/Dockerfile
    restart: unless-stopped
    ports:
      - '8101:8101'
    environment:
      AGENT_DATABASE_URL: postgresql://postgres:postgres@postgres-agents:5432/agent_ltm
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      INFERENCE_MODE: mock
    depends_on:
      postgres-agents:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy

  agt02-learning-path:
    build:
      context: ../agents
      dockerfile: agt02_learning_path/Dockerfile
    restart: unless-stopped
    ports:
      - '8102:8102'
    environment:
      AGENT_DATABASE_URL: postgresql://postgres:postgres@postgres-agents:5432/agent_ltm
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      INFERENCE_MODE: mock
      LM_SERVICE_BASE_URL: http://learning-materials-service:4002
      LM_INTERNAL_SECRET: dev-internal-secret
    depends_on:
      postgres-agents:
        condition: service_healthy
      learning-materials-service:
        condition: service_started

  agt03-tutor:
    build:
      context: ../agents
      dockerfile: agt03_tutor/Dockerfile
    restart: unless-stopped
    ports:
      - '8103:8103'
    environment:
      AGENT_DATABASE_URL: postgresql://postgres:postgres@postgres-agents:5432/agent_ltm
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      INFERENCE_MODE: mock
      AGT04_BASE_URL: http://agt04-feedback:8104
      AGT06_BASE_URL: http://agt06-memory:8106
      AGT07_BASE_URL: http://agt07-review:8107
      AGT11_BASE_URL: http://agt11-translation:8111
    depends_on:
      postgres-agents:
        condition: service_healthy
      kafka:
        condition: service_healthy
      agt04-feedback:
        condition: service_started
      agt06-memory:
        condition: service_started
      agt07-review:
        condition: service_started
      agt11-translation:
        condition: service_started

  agt04-feedback:
    build:
      context: ../agents
      dockerfile: agt04_feedback/Dockerfile
    restart: unless-stopped
    ports:
      - '8104:8104'
    environment:
      AGENT_DATABASE_URL: postgresql://postgres:postgres@postgres-agents:5432/agent_ltm
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      LANGUAGETOOL_URL: http://languagetool:8010/v2
      AGT06_BASE_URL: http://agt06-memory:8106
      AGT11_BASE_URL: http://agt11-translation:8111
      INFERENCE_MODE: mock
    depends_on:
      postgres-agents:
        condition: service_healthy
      languagetool:
        condition: service_started
      agt06-memory:
        condition: service_started
      agt11-translation:
        condition: service_started

  agt05-assessment:
    build:
      context: ../agents
      dockerfile: agt05_assessment/Dockerfile
    restart: unless-stopped
    ports:
      - '8105:8105'
    environment:
      AGENT_DATABASE_URL: postgresql://postgres:postgres@postgres-agents:5432/agent_ltm
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      LMS_BASE_URL: http://learning-materials-service:4002
      INFERENCE_MODE: mock
    depends_on:
      postgres-agents:
        condition: service_healthy
      learning-materials-service:
        condition: service_started

  agt06-memory:
    build:
      context: ../agents
      dockerfile: agt06_memory/Dockerfile
    restart: unless-stopped
    ports:
      - '8106:8106'
    environment:
      AGENT_DATABASE_URL: postgresql://postgres:postgres@postgres-agents:5432/agent_ltm
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      OLLAMA_BASE_URL: http://ollama:11434
      INFERENCE_MODE: mock
    depends_on:
      postgres-agents:
        condition: service_healthy
      ollama:
        condition: service_started

  agt07-review:
    build:
      context: ../agents
      dockerfile: agt07_review/Dockerfile
    restart: unless-stopped
    ports:
      - '8107:8107'
    environment:
      AGENT_DATABASE_URL: postgresql://postgres:postgres@postgres-agents:5432/agent_ltm
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      INFERENCE_MODE: mock
      INTERNAL_SECRET: dev-internal-secret
    depends_on:
      postgres-agents:
        condition: service_healthy

  agt08-analysis:
    build:
      context: ../agents
      dockerfile: agt08_analysis/Dockerfile
    restart: unless-stopped
    ports:
      - '8108:8108'
    environment:
      AGENT_DATABASE_URL: postgresql://postgres:postgres@postgres-agents:5432/agent_ltm
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      INFERENCE_MODE: mock
    depends_on:
      postgres-agents:
        condition: service_healthy

  agt09-recommendation:
    build:
      context: ../agents
      dockerfile: agt09_recommendation/Dockerfile
    restart: unless-stopped
    ports:
      - '8109:8109'
    environment:
      AGENT_DATABASE_URL: postgresql://postgres:postgres@postgres-agents:5432/agent_ltm
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      INFERENCE_MODE: mock
    depends_on:
      postgres-agents:
        condition: service_healthy

  agt10-habit:
    build:
      context: ../agents
      dockerfile: agt10_habit/Dockerfile
    restart: unless-stopped
    ports:
      - '8110:8110'
    environment:
      AGENT_DATABASE_URL: postgresql://postgres:postgres@postgres-agents:5432/agent_ltm
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      INFERENCE_MODE: mock
    depends_on:
      postgres-agents:
        condition: service_healthy

  agt11-translation:
    build:
      context: ../agents
      dockerfile: agt11_translation/Dockerfile
    restart: unless-stopped
    ports:
      - '8111:8111'
    environment:
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      OLLAMA_BASE_URL: http://ollama:11434
      INFERENCE_MODE: mock
    depends_on:
      redis:
        condition: service_started
      ollama:
        condition: service_started

  agt-orchestrator:
    build:
      context: ../agents
      dockerfile: agt_orchestrator/Dockerfile
    restart: unless-stopped
    ports:
      - '8100:8100'
    environment:
      KAFKA_BROKERS: kafka:9092
      AGT01_BASE_URL: http://agt01-profiling:8101
      AGT02_BASE_URL: http://agt02-learning-path:8102
      LM_SERVICE_BASE_URL: http://learning-materials-service:4002
      INTERNAL_SECRET: dev-internal-secret
    depends_on:
      kafka:
        condition: service_healthy
      agt01-profiling:
        condition: service_started
      agt02-learning-path:
        condition: service_started
      learning-materials-service:
        condition: service_started

volumes:
  postgres-user-data:
  postgres-learning-materials-data:
  postgres-notification-data:
  minio-data:
  postgres-agents-data:
  ollama-models:
