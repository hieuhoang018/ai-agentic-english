# Production override for infra/docker-compose.yml.
#
# Usage:
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml up -d
#
# Switches every agent service from INFERENCE_MODE=mock (the base file's dev
# default) to INFERENCE_MODE=live, and passes through the LLM provider API
# keys those agents read via agents/shared/config.py's Settings class.
#
# GROQ_API_KEY and OPENROUTER_API_KEY have no default — if unset, Compose
# substitutes an empty string. This does NOT fail loudly: the openai SDK
# raises at client construction on an empty key, which agents/shared/llm/
# router.py's per-tier exception handling catches and silently falls
# through to the next tier — with both keys empty, every LLM call quietly
# lands on the Ollama backstop (no API key required) instead of erroring.
# That looks like normal operation in logs (warning-level only) while
# actually running local CPU inference instead of the intended provider.
# Set real values in a gitignored infra/.env (see .env.example) and verify
# they're picked up — don't rely on a loud failure to catch a missing key.
# Ollama (Tier 3 backstop) needs no API key — only OLLAMA_BASE_URL, already
# set per-service in the base file.
#
# INTERNAL_SECRET/LM_INTERNAL_SECRET also have no default here, for the same
# "required in prod" reasons as the API keys above — BUT unlike the API-key
# case, a missing/default value for this one does not merely degrade to a
# fallback: agents/shared/security.py's assert_internal_secret_is_safe makes
# the affected process refuse to start (raises at import time, before any
# request is served) when INFERENCE_MODE=live (Python) or DEPLOY_ENV=
# production (the 3 Node services below) and the secret is still
# "dev-internal-secret" or empty.
#
# Every agent below needs INTERNAL_SECRET set in prod, NOT just the ones
# that actually send/verify an x-internal-secret header themselves. The
# guard is wired into agents/shared/config.py's Settings class via a
# pydantic model_validator, and Settings() is constructed at import time by
# agents/shared/db/postgres.py, redis_client.py, events/producer.py,
# events/consumer.py, and llm/router.py — every one of agt01 through agt11
# transitively imports at least one of those (DB/Redis/Kafka/LLM access is
# universal), so every one of them constructs the shared Settings singleton
# and runs this check on startup, regardless of whether that specific agent
# has any internal-secret-gated HTTP route. Verified directly: importing
# agt01_profiling.main or agt08_analysis.consumers under INFERENCE_MODE=live
# with INTERNAL_SECRET unset raises RuntimeError from this guard, even
# though neither AGT-01 nor AGT-08 sends/checks x-internal-secret anywhere.
# agt_orchestrator/main.py and agt02_learning_path/service.py additionally
# read their own env var directly (rather than through Settings) and call
# the guard a second time, since they gate their own /generate-style routes.
# packages/shared's createInternalMiddleware/createInternalHttpClient cover
# the 3 Node services the same way, keyed off DEPLOY_ENV instead.
# That's the actual enforcement — this file just declares the requirement,
# consistent with the GROQ/OPENROUTER pattern.

services:
  agt01-profiling:
    environment:
      INFERENCE_MODE: live
      GROQ_API_KEY: ${GROQ_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      INTERNAL_SECRET: ${INTERNAL_SECRET}

  agt02-learning-path:
