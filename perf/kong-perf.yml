# PERF-TEST-ONLY Kong config. Generated from gateway/kong/kong.yml with one
# addition: a second consumer accepting TEST_ISSUER-signed tokens (the
# self-signed test JWT keypair in packages/shared/src/testing/index.ts,
# already used by every service's test suite via signTestToken()). This lets
# perf/generate-tokens.mjs mint tokens locally for arbitrary synthetic
# clerkUserIds with no Clerk dependency, while leaving the real `clerk-test`
# consumer (pinned to the real Clerk app) untouched below - both are valid
# simultaneously, Kong picks whichever consumer's key matches the token's
# `iss` claim. Do NOT use this file for anything but local perf runs - see
# perf/README.md. Never deploy this file; gateway/kong/kong.yml (and its
# rendered kong.generated.yml) are the real configs.
#
# Regenerate this file from the real config whenever gateway/kong/kong.yml
# changes: `cp gateway/kong/kong.yml perf/kong-perf.yml`, then re-add the
# perf-test-clerk consumer block below.
#
# Phase 0: routing only, no auth yet.
#
# Phase 1: `/api/<service>/*` routes are validated with the Kong `jwt`
# plugin, using a static RS256 public key matching the test JWKS in
# `@ai-agentic-english/shared` (packages/shared/src/testing/index.ts). The
# consumer's `key` matches the JWT `iss` claim (TEST_ISSUER). To swap in a
# real Clerk app, regenerate `rsa_public_key` from the Clerk JWKS and update
# `key`/`rsa_public_key` below - no other config changes are needed.
#
# `/health` and `/webhooks/*` routes are left unauthenticated.
#
# Each backend service exposes `GET /health`, routed here as
# `/api/health/<service>` for the Phase 0 verification step.

consumers:
  - username: clerk-test
    jwt_secrets:
      - key: https://elegant-anchovy-29.clerk.accounts.dev
        algorithm: RS256
        rsa_public_key: |
