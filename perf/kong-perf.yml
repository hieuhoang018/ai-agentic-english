# The web app calls Kong directly from the browser during local development.
# Handle browser preflight requests before the JWT plugin and allow the headers
# used by the typed API client.
plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
      methods:
        - GET
        - HEAD
        - POST
        - PATCH
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
      preflight_continue: false
  # Every route's rate-limiting plugin below is keyed by `X-Clerk-User-Id`
  # (see `limit_by: header` on each), not by Kong consumer. Reason: the `jwt`
  # plugin resolves a consumer by matching the token's `iss` claim, and this
  # app has exactly one consumer for the one real Clerk app - so every real
  # user's token maps to the *same* consumer, and consumer-keyed limits would
  # be one shared budget across the entire user base instead of a genuine
  # per-user cap (confirmed empirically via a JMeter load test, see
  # docs/jmeter-perf-test-plan.md and perf/README.md - 92% of requests got a
  # 429 at 30 concurrent simulated users, well below what any real per-route
  # limit below should allow for 30 distinct users).
  #
  # This plugin sets that header from the token's `sub` claim so downstream
  # rate-limiting plugins can key on it. Ordering matters and is enforced via
  # each plugin's compiled-in PRIORITY (Kong OSS has no `ordering` config
  # field - that's Enterprise-only, confirmed against this Kong install's
  # /schemas/plugins/pre-function and /schemas/plugins endpoints, so we can't
  # declare "run after jwt" explicitly): pre-function's PRIORITY is
  # 1,000,000, jwt's is 1450, rate-limiting's is 910 - Kong runs access-phase
  # plugins in descending PRIORITY order, so the natural order is already
  # pre-function -> jwt -> rate-limiting, with no extra config needed.
  # pre-function decodes (not verifies - jwt hasn't run yet) the bearer
  # token's payload segment by hand (base64url -> string.match for the "sub"
  # field), so it can't disagree with what jwt validates a moment later. NOT
  # using kong.plugins.jwt.jwt_parser here: pre-function's Lua runs inside
  # Kong's untrusted_lua sandbox, which blocks all `require()` calls not in
  # `untrusted_lua_sandbox_requires` (empty by default, confirmed against
  # this Kong install - kong.tools.sandbox errors with "require '...' not
  # allowed within sandbox" for any module, including Kong's own). `ngx` and
  # `kong` are pre-injected sandbox globals (no require needed - that's why
  # kong.request.get_header/kong.service.request.set_header work below), and
  # core `string.*`/`table.*` are allowlisted too, so this only uses those.
  # If the token is missing/malformed, this is a no-op (no header set) and
  # jwt's own validation - which runs next - rejects the request with 401
  # before rate-limiting ever executes, so no rate-limit budget is spent on
  # unauthenticated requests. A client sending its own X-Clerk-User-Id is
  # harmless: this always overwrites it with the value decoded from the
  # verified token, never trusts the incoming header.
  - name: pre-function
    config:
      access:
        - |
          local auth_header = kong.request.get_header("Authorization")
          if auth_header then
            local token = auth_header:match("^[Bb]earer%s+(.+)$")
            if token then
              local payload_b64 = token:match("^[^.]+%.([^.]+)%.")
              if payload_b64 then
                payload_b64 = payload_b64:gsub("-", "+"):gsub("_", "/")
                local pad = (4 - (#payload_b64 % 4)) % 4
                payload_b64 = payload_b64 .. string.rep("=", pad)
                local ok, payload = pcall(ngx.decode_base64, payload_b64)
                if ok and payload then
                  local sub = payload:match('"sub"%s*:%s*"([^"]*)"')
                  if sub then
                    kong.service.request.set_header("X-Clerk-User-Id", sub)
                  end
                end
              end
            end
          end
  # Global floor for every route, including ones without a route-specific
  # rate-limiting plugin below (e.g. the catalog GETs). `policy: local` is an
  # in-memory per-node counter — fine for the single Kong instance this stack
  # runs today; switch to `policy: redis` (the `redis` container already
  # exists in the stack) if Kong is ever scaled horizontally, since `local`
  # counters don't sync across nodes.
  - name: rate-limiting
    config:
      limit_by: header
      header_name: X-Clerk-User-Id
      minute: 300
      hour: 3000
      policy: local
  # One consistent cap regardless of what each backend framework defaults to
  # (the 3 TS services get Express's 100kb default; the FastAPI agent routes
  # proxied through Kong have no equivalent backstop of their own).
  - name: request-size-limiting
    config:
      allowed_payload_size: 1

services:
  - name: user-service
    url: http://user-service:4001/health
    routes:
      - name: user-service-health
        paths:
          - /api/health/user-service
        strip_path: true
        methods:
          - GET

  - name: user-service-webhooks
    url: http://user-service:4001/webhooks
    routes:
      - name: user-service-webhooks
        paths:
          - /api/webhooks/user-service
        strip_path: true
        plugins:
          # No jwt plugin here (Svix verifies its own signature downstream) —
          # keyed by IP since there's no JWT consumer identity to key on.
          - name: rate-limiting
            config:
              limit_by: ip
              minute: 60
              hour: 1000
              policy: local

  - name: user-service-api
    url: http://user-service:4001/users
    routes:
      - name: user-service-api
        paths:
          - /api/users
        strip_path: true
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
                - nbf

