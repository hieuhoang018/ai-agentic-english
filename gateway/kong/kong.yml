_format_version: '3.0'
_transform: true

# Phase 0: routing only, no auth yet.
#
# Phase 1: `/api/<service>/*` routes are validated with the Kong `jwt`
# plugin, using a static RS256 public key matching the test JWKS in
# `@ai-agentic-english/shared` (packages/shared/src/testing/index.ts). The
# consumer's `key` matches the JWT `iss` claim (TEST_ISSUER). To swap in a
# real Clerk app, regenerate `rsa_public_key` from the Clerk JWKS and update
# `key`/`rsa_public_key` below - no other config changes are needed.
#
# `/health` and `/webhooks/*` routes are left unauthenticated.
#
# Each backend service exposes `GET /health`, routed here as
# `/api/health/<service>` for the Phase 0 verification step.

consumers:
  - username: clerk-test
    jwt_secrets:
      - key: https://test-clerk.example.com
        algorithm: RS256
        rsa_public_key: |
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAyW0PfHI1+phKKjJF6iMD
          8JrhmwPmqO104SjgdiTRA+VC8pnXrLOH8vVeB8O64CPrJjxi6AVUt9qkacUIUs20
          YZA7deGxsTcUCW+0fylB5kHmIH/wQepwufz829v4Mh29GIpjPyZblztFA6tQth1m
          6HppOD9XjOupxqirUEfm4OABF4zDdCfiU094KkzpIJ9khXK4JSwsrqHs/z2nghgp
          jyoT5w8WtQ7Df53SeX/Qxx4le5h/gr1dQ4uX1q+VAeIkQHlcbuFsxhHnD92mL2Te
          3+8+j3mmneGoBvMWT3Lw+tbbLiKkLa3HkE+RxcJU414XAnDe4A3M/shiLoaNw6lP
          EQIDAQAB
          -----END PUBLIC KEY-----

services:
  - name: user-service
    url: http://user-service:4001/health
    routes:
      - name: user-service-health
        paths:
          - /api/health/user-service
        strip_path: true
        methods:
          - GET

  - name: user-service-webhooks
    url: http://user-service:4001/webhooks
    routes:
      - name: user-service-webhooks
        paths:
          - /api/webhooks/user-service
        strip_path: true

  - name: user-service-api
    url: http://user-service:4001/users
    routes:
      - name: user-service-api
        paths:
          - /api/users
        strip_path: true
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp

  - name: learning-materials-service
    url: http://learning-materials-service:4002/health
    routes:
      - name: learning-materials-service-health
        paths:
          - /api/health/learning-materials-service
        strip_path: true
        methods:
          - GET

  - name: memory-progress-service
    url: http://memory-progress-service:4003/health
    routes:
      - name: memory-progress-service-health
        paths:
          - /api/health/memory-progress-service
        strip_path: true
        methods:
          - GET

  - name: ai-tutor-service
    url: http://ai-tutor-service:4004/health
    routes:
      - name: ai-tutor-service-health
        paths:
          - /api/health/ai-tutor-service
        strip_path: true
        methods:
          - GET

  - name: notification-service
    url: http://notification-service:4005/health
    routes:
      - name: notification-service-health
        paths:
          - /api/health/notification-service
        strip_path: true
        methods:
          - GET
