  - name: agt-orchestrator-onboarding
    url: http://agt-orchestrator:8100/orchestrate/onboarding
    routes:
      - name: agt-orchestrator-onboarding-route
        paths:
          - /api/orchestrate/onboarding
        strip_path: true
        methods:
          - POST
          - OPTIONS
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
                - nbf
          # Proxies to agt-orchestrator, which calls out to LLMs — real
          # dollar cost per request. A user isn't submitting onboarding
          # requests every second.
          - name: rate-limiting
            config:
              minute: 20
              hour: 200
              policy: local

  - name: agt-orchestrator-grading
    url: http://agt-orchestrator:8100/orchestrate/grading
