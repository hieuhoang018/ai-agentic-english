        strip_path: true
        methods:
          - POST
          - OPTIONS
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
                - nbf
          # Single-use enforcement stops a *used* ticket being replayed, but
          # nothing stops rapid re-issuance of new ones — cap it separately.
          - name: rate-limiting
            config:
              minute: 10
              hour: 60
              policy: local

