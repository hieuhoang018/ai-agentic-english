_format_version: '3.0'
_transform: true

# Phase 0: routing only, no auth yet.
#
# Phase 1: `/api/<service>/*` routes are validated with the Kong `jwt`
# plugin, using a static RS256 public key matching the test JWKS in
# `@ai-agentic-english/shared` (packages/shared/src/testing/index.ts). The
# consumer's `key` matches the JWT `iss` claim (TEST_ISSUER). To swap in a
# real Clerk app, regenerate `rsa_public_key` from the Clerk JWKS and update
# `key`/`rsa_public_key` below - no other config changes are needed.
#
# `/health` and `/webhooks/*` routes are left unauthenticated.
#
# Each backend service exposes `GET /health`, routed here as
# `/api/health/<service>` for the Phase 0 verification step.

consumers:
  - username: clerk-test
    jwt_secrets:
      - key: https://elegant-anchovy-29.clerk.accounts.dev
        algorithm: RS256
        rsa_public_key: |
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAuuN04KpT0b6I4BCr87mT
          nYd+ku8a8Y7LEHCMrrwMJcaPFio6i2C73G1equcp+Zb88agYmgX+iStGT694YjOb
          OVmCQy+n4DUB2rHeu+fbso8T+OXojZjVwfqw3PMthNX7BIQcAkVoK8eEBRzUPXYz
          0mUPkqVxpDxpzLoW6jvj+iES7ZhaUfsviekFaa3NY2i6R+qjzpLraRmJAGc3o+qA
          xcDLIELHlH9mJA1xxcRLU0tSel3fSsbuDX/FNC5+ifx94WC6tuaTAzRa5gsonrN2
          5mGZM4fWjt4l+FNuyA1qUoyp5XqOQQSBueIGJmvGI0vJLofCzD4E8iwVaZS4ZMS8
          wQIDAQAB
          -----END PUBLIC KEY-----

# The web app calls Kong directly from the browser during local development.
# Handle browser preflight requests before the JWT plugin and allow the headers
# used by the typed API client.
plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
      methods:
        - GET
        - HEAD
        - POST
        - PATCH
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
      preflight_continue: false
  # Global floor for every route, including ones without a route-specific
  # rate-limiting plugin below (e.g. the catalog GETs). `policy: local` is an
  # in-memory per-node counter — fine for the single Kong instance this stack
  # runs today; switch to `policy: redis` (the `redis` container already
  # exists in the stack) if Kong is ever scaled horizontally, since `local`
  # counters don't sync across nodes.
  - name: rate-limiting
    config:
      minute: 300
      hour: 3000
      policy: local
  # One consistent cap regardless of what each backend framework defaults to
  # (the 3 TS services get Express's 100kb default; the FastAPI agent routes
  # proxied through Kong have no equivalent backstop of their own).
  - name: request-size-limiting
    config:
      allowed_payload_size: 1

services:
  - name: user-service
    url: http://user-service:4001/health
    routes:
      - name: user-service-health
        paths:
          - /api/health/user-service
        strip_path: true
        methods:
          - GET

  - name: user-service-webhooks
    url: http://user-service:4001/webhooks
    routes:
      - name: user-service-webhooks
        paths:
          - /api/webhooks/user-service
        strip_path: true
        plugins:
          # No jwt plugin here (Svix verifies its own signature downstream) —
          # keyed by IP since there's no JWT consumer identity to key on.
          - name: rate-limiting
            config:
              limit_by: ip
              minute: 60
              hour: 1000
              policy: local

  - name: user-service-api
    url: http://user-service:4001/users
    routes:
      - name: user-service-api
        paths:
          - /api/users
        strip_path: true
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
                - nbf

  - name: learning-materials-service-health
