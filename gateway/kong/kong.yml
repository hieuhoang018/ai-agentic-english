          # Same LLM-cost rationale as the onboarding route above.
          - name: rate-limiting
            config:
              minute: 20
              hour: 200
              policy: local

  - name: agt03-speaking-ticket
    url: http://agt03-tutor:8103/speaking/session-ticket
    routes:
