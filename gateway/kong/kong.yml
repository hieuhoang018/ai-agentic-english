            config:
              claims_to_verify:
                - exp
                - nbf
          # No cap on sync frequency previously — request *size* is bounded
          # separately by the global request-size-limiting plugin above.
          - name: rate-limiting
            config:
              minute: 30
              hour: 300
              policy: local

