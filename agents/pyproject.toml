[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = [".."]
testpaths = [
    "agt01_profiling/tests",
    "agt02_learning_path/tests",
    "agt03_tutor/tests",
    "agt04_feedback/tests",
    "agt05_assessment/tests",
    "agt06_memory/tests",
    "agt07_review/tests",
    "agt08_analysis/tests",
    "agt09_recommendation/tests",
    "agt10_habit/tests",
    "agt11_translation/tests",
    "agt_orchestrator/tests",
    "shared/llm/tests",
    "shared/auth/tests",
]
markers = [
    "integration: requires a live postgres-agents on localhost:5438 with migrations applied (docker compose up -d postgres-agents && infra/scripts/run-agent-migrations.sh)",
]
